<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Miru Cravings Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f5f0eb;
    --card: #ffffff;
    --accent-green: #2e7d32;
    --accent-blue: #1a237e;
    --veg-color: #2e7d32;
    --nonveg-color: #b71c1c;
    --text-primary: #1a1a1a;
    --text-secondary: #555;
    --text-muted: #888;
    --border: #e8e0d8;
    --add-btn: #1a237e;
    --remove-btn: #fff;
    --shadow: 0 4px 24px rgba(0,0,0,0.07);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: #fff;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.5px;
  }

  .brand span {
    color: var(--accent-green);
  }

  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn-order {
    background: var(--accent-blue);
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-order:hover { background: #283593; transform: translateY(-1px); }

  .btn-cart {
    background: var(--accent-green);
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .btn-cart:hover { background: #1b5e20; transform: translateY(-1px); }

  .cart-count {
    position: absolute;
    top: -8px;
    right: -8px;
    background: #e53935;
    color: #fff;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  /* USER INFO BAR */
  .user-bar {
    background: #e8f5e9;
    padding: 8px 28px;
    font-size: 0.82rem;
    color: var(--accent-green);
    font-weight: 500;
    border-bottom: 1px solid #c8e6c9;
  }

  /* CATEGORY BAR */
  .category-section {
    padding: 20px 28px 0;
  }

  .category-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .category-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .category-scroll::-webkit-scrollbar { display: none; }

  .cat-chip {
    background: #fff;
    border: 1.5px solid var(--border);
    color: var(--text-secondary);
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .cat-chip:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
  }

  .cat-chip.active {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: #fff;
  }

  /* MENU GRID */
  .menu-section {
    padding: 24px 28px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 18px;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
  }

  /* MENU CARD */
  .menu-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid var(--border);
    position: relative;
  }

  .menu-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.11);
  }

  .menu-card.unavailable {
    opacity: 0.6;
    pointer-events: none;
  }

  /* LEFT SIDE */
  .card-left {
    width: 140px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 12px;
    background: #fafafa;
    border-right: 1px solid var(--border);
    position: relative;
  }

  .item-img {
    width: 90px;
    height: 90px;
    border-radius: 12px;
    object-fit: cover;
    margin-bottom: 8px;
  }

  .item-img-placeholder {
    width: 90px;
    height: 90px;
    border-radius: 12px;
    background: linear-gradient(135deg, #e0e0e0, #bdbdbd);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin-bottom: 8px;
  }

  .item-name-left {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    line-height: 1.3;
  }

  .status-badge {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--veg-color);
    margin-top: 4px;
  }

  .status-badge.unavailable-text { color: #e53935; }

  .qty-left {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .food-type-badge {
    position: absolute;
    bottom: 10px;
    left: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .food-type-badge.veg {
    background: #e8f5e9;
    color: var(--veg-color);
    border: 1px solid #a5d6a7;
  }

  .food-type-badge.nonveg {
    background: var(--nonveg-color);
    color: #fff;
  }

  /* RIGHT SIDE */
  .card-right {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .item-desc {
    font-size: 0.82rem;
    color: var(--text-secondary);
    line-height: 1.5;
    font-weight: 400;
    flex: 1;
    margin-bottom: 10px;
  }

  .item-price {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 10px;
  }

  .card-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn-add {
    background: var(--add-btn);
    color: #fff;
    border: none;
    padding: 9px 16px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-add:hover { background: #283593; }
  .btn-add:active { transform: scale(0.97); }

  .btn-add.loading { opacity: 0.7; pointer-events: none; }

  .btn-remove {
    background: #fff;
    color: var(--nonveg-color);
    border: 1.5px solid var(--nonveg-color);
    padding: 9px 16px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-remove:hover { background: #ffeaea; }
  .btn-remove:active { transform: scale(0.97); }

  .qty-hint {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 4px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    color: #fff;
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #2e7d32; }
  .toast.error { background: #b71c1c; }

  /* LOADING */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.9rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.95rem; }

  /* ERROR BANNER */
  .error-banner {
    background: #fff3e0;
    border: 1px solid #ffcc80;
    border-radius: 10px;
    padding: 16px 20px;
    margin: 20px 28px;
    font-size: 0.85rem;
    color: #e65100;
    display: none;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .header { padding: 14px 16px; }
    .brand { font-size: 1.3rem; }
    .btn-order, .btn-cart { padding: 8px 14px; font-size: 0.78rem; }
    .category-section, .menu-section { padding-left: 16px; padding-right: 16px; }
    .menu-grid { grid-template-columns: 1fr; }
    .card-left { width: 120px; }
    .item-img, .item-img-placeholder { width: 75px; height: 75px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="brand">Miru <span>Cravings</span></div>
  <div class="header-actions">
    <button class="btn-order" onclick="goToOrders()">ORDER</button>
    <button class="btn-cart" onclick="goToCart()">
      CART
      <span class="cart-count" id="cartCount" style="display:none">0</span>
    </button>
  </div>
</header>

<!-- USER INFO -->
<div class="user-bar" id="userBar">
  👤 Loading session...
</div>

<!-- ERROR BANNER -->
<div class="error-banner" id="errorBanner"></div>

<!-- CATEGORIES -->
<div class="category-section">
  <div class="category-label">Browse Menu</div>
  <div class="category-scroll" id="categoryScroll">
    <div class="cat-chip active" data-cat="all" onclick="filterCategory('all', this)">All Items</div>
  </div>
</div>

<!-- MENU -->
<div class="menu-section">
  <div id="menuContainer">
    <div class="loading-screen">
      <div class="spinner"></div>
      <div class="loading-text">Loading menu...</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIGURATION — Update these values for your Zoho Creator app
// ============================================================
const CONFIG = {
  appLinkName: "miru-cravings",
  accountOwner: "head.sales_zodoworks",
  cartFormName: "Cart",
  menuReportName: "manage_quantity",
  categoryReportName: "Menu_Categories_Report",
  cartPageURL: "#Page:Customer_Cart",
  ordersPageURL: "#Page:Order_page",
};

// ============================================================
// SESSION — Get mobile number from URL param or localStorage
// ============================================================
let sessionMobile = "";
let cartItems = {};

function getSession() {
  const urlParams = new URLSearchParams(window.location.search);
  const mobileFromURL = urlParams.get("mobile");

  if (mobileFromURL) {
    localStorage.setItem("mc_mobile", mobileFromURL);
    sessionMobile = mobileFromURL;
  } else {
    sessionMobile = localStorage.getItem("mc_mobile") || "";
  }

  const userBar = document.getElementById("userBar");
  if (sessionMobile) {
    userBar.innerHTML = `👤 Ordering as: <strong>+91 ${sessionMobile}</strong>`;
    userBar.style.background = "#e8f5e9";
  } else {
    userBar.innerHTML = `⚠️ Session not found. <a href="/app/${CONFIG.appLinkName}" style="color:#1a237e;font-weight:600;">Click here to start again</a>`;
    userBar.style.background = "#fff3e0";
    userBar.style.color = "#e65100";
    userBar.style.borderBottomColor = "#ffcc80";
  }
}

// ============================================================
// ZOHO CREATOR API
// ============================================================
async function fetchFromCreator(reportName, criteria = "") {
  let url = `https://creator.zoho.com/api/v2/${CONFIG.accountOwner}/${CONFIG.appLinkName}/report/${reportName}`;
  if (criteria) url += `?criteria=${encodeURIComponent(criteria)}`;

  const response = await ZOHO.CREATOR.API.getRecords({
    appName: CONFIG.appLinkName,
    reportName: reportName,
    criteria: criteria || undefined,
    page: 1,
    pageSize: 200
  });

  return response.data || [];
}

// ============================================================
// LOAD CATEGORIES
// ============================================================
async function loadCategories() {
  try {
    const cats = await ZOHO.CREATOR.API.getRecords({
      appName: CONFIG.appLinkName,
      reportName: CONFIG.categoryReportName,
      criteria: 'Active == "Yes"',
      page: 1,
      pageSize: 50
    });

    const scroll = document.getElementById("categoryScroll");
    const data = cats.data || [];

    data.forEach(cat => {
      const chip = document.createElement("div");
      chip.className = "cat-chip";
      chip.textContent = cat.Category_Name;
      chip.dataset.cat = cat.Category_Name;
      chip.onclick = function() { filterCategory(cat.Category_Name, this); };
      scroll.appendChild(chip);
    });
  } catch (e) {
    console.error("Category load error:", e);
  }
}

// ============================================================
// LOAD MENU ITEMS
// ============================================================
let allMenuItems = [];

async function loadMenu() {
  try {
    const res = await ZOHO.CREATOR.API.getRecords({
      appName: CONFIG.appLinkName,
      reportName: CONFIG.menuReportName,
      page: 1,
      pageSize: 200
    });

    allMenuItems = res.data || [];
    renderMenu(allMenuItems);
  } catch (e) {
    console.error("Menu load error:", e);
    showError("Failed to load menu. Please refresh the page.");
    document.getElementById("menuContainer").innerHTML = `
      <div class="empty-state">
        <div class="emoji">⚠️</div>
        <p>Could not load menu. Please refresh.</p>
      </div>`;
  }
}

// ============================================================
// RENDER MENU
// ============================================================
function renderMenu(items) {
  const container = document.getElementById("menuContainer");

  if (!items || items.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🍽️</div>
        <p>No items available in this category.</p>
      </div>`;
    return;
  }

  const grid = document.createElement("div");
  grid.className = "menu-grid";

  items.forEach(item => {
    const isAvailable = item.Status === "Available" || item.Status === "available";
    const isVeg = item.Food_Type === "Veg" || item.Food_Type === "veg";
    const imgURL = item.Image || "";

    const card = document.createElement("div");
    card.className = `menu-card ${!isAvailable ? "unavailable" : ""}`;
    card.dataset.id = item.ID;

    card.innerHTML = `
      <div class="card-left">
        ${imgURL
          ? `<img class="item-img" src="${imgURL}" alt="${item.Item_Name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ""}
        <div class="item-img-placeholder" style="${imgURL ? "display:none" : ""}">🍽️</div>
        <div class="item-name-left">${item.Item_Name || ""}</div>
        <div class="status-badge ${!isAvailable ? "unavailable-text" : ""}">
          ${isAvailable ? "● Available" : "● Unavailable"}
        </div>
        <div class="qty-left">Qty: ${item.Available_Quantity || 0}</div>
        <div class="food-type-badge ${isVeg ? "veg" : "nonveg"}">
          ${isVeg ? "Veg" : "Non-Veg"}
        </div>
      </div>
      <div class="card-right">
        <div class="item-desc">${item.Description || "A delicious item from our kitchen."}</div>
        <div class="item-price">₹ ${parseFloat(item.Price || 0).toFixed(2)}</div>
        <div class="card-actions">
          <button class="btn-add" onclick="addToCart('${item.ID}', '${escHtml(item.Item_Name)}', ${item.Price || 0})">
            + Add to Cart
          </button>
          <button class="btn-remove" onclick="removeFromCart('${item.ID}', '${escHtml(item.Item_Name)}')">
            − Remove
          </button>
        </div>
        <div class="qty-hint">You can increase quantities in cart page</div>
      </div>
    `;

    grid.appendChild(card);
  });

  container.innerHTML = "";
  container.appendChild(grid);
}

// ============================================================
// FILTER BY CATEGORY
// ============================================================
function filterCategory(cat, el) {
  document.querySelectorAll(".cat-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");

  if (cat === "all") {
    renderMenu(allMenuItems);
  } else {
    const filtered = allMenuItems.filter(item =>
      item.Categories === cat || (item.Categories && item.Categories.includes(cat))
    );
    renderMenu(filtered);
  }
}

// ============================================================
// ADD TO CART
// ============================================================
async function addToCart(itemID, itemName, price) {
  if (!sessionMobile) {
    showToast("⚠️ Session expired. Please scan QR again.", "error");
    return;
  }

  const btn = event.target;
  btn.classList.add("loading");
  btn.textContent = "Adding...";

  try {
    // Check if item already in cart for this user
    const existing = await ZOHO.CREATOR.API.getRecords({
      appName: CONFIG.appLinkName,
      reportName: "Cart_Report", // your cart report name
      criteria: `Session_ID == "${sessionMobile}" && Menu_Items == "${itemID}"`,
      page: 1,
      pageSize: 1
    });

    if (existing.data && existing.data.length > 0) {
      showToast("✅ Already in cart! Increase qty in cart page.", "success");
      btn.classList.remove("loading");
      btn.textContent = "+ Add to Cart";
      return;
    }

    // Create cart record
    const cartData = {
      data: {
        Session_ID: sessionMobile,
        Menu_Items: itemID,
        Quantity: 1,
        Price: price,
        Subtotal: price,
        Customer_Mobile: sessionMobile
      }
    };

    await ZOHO.CREATOR.API.createRecord({
      appName: CONFIG.appLinkName,
      formName: CONFIG.cartFormName,
      data: cartData
    });

    // Update cart count
    cartItems[itemID] = true;
    updateCartCount();
    showToast(`🛒 ${itemName} added to cart!`, "success");

  } catch (e) {
    console.error("Add to cart error:", e);
    showToast("❌ Failed to add item. Try again.", "error");
  }

  btn.classList.remove("loading");
  btn.textContent = "+ Add to Cart";
}

// ============================================================
// REMOVE FROM CART
// ============================================================
async function removeFromCart(itemID, itemName) {
  if (!sessionMobile) {
    showToast("⚠️ Session expired. Please scan QR again.", "error");
    return;
  }

  try {
    const existing = await ZOHO.CREATOR.API.getRecords({
      appName: CONFIG.appLinkName,
      reportName: "Cart_Report",
      criteria: `Session_ID == "${sessionMobile}" && Menu_Items == "${itemID}"`,
      page: 1,
      pageSize: 1
    });

    if (!existing.data || existing.data.length === 0) {
      showToast("Item not in cart.", "error");
      return;
    }

    const recordID = existing.data[0].ID;

    await ZOHO.CREATOR.API.deleteRecord({
      appName: CONFIG.appLinkName,
      reportName: "Cart_Report",
      id: recordID
    });

    delete cartItems[itemID];
    updateCartCount();
    showToast(`🗑️ ${itemName} removed from cart.`, "success");

  } catch (e) {
    console.error("Remove error:", e);
    showToast("❌ Failed to remove item. Try again.", "error");
  }
}

// ============================================================
// HELPERS
// ============================================================
function updateCartCount() {
  const count = Object.keys(cartItems).length;
  const badge = document.getElementById("cartCount");
  if (count > 0) {
    badge.style.display = "flex";
    badge.textContent = count;
  } else {
    badge.style.display = "none";
  }
}

function showToast(msg, type = "") {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => { toast.className = "toast"; }, 3000);
}

function showError(msg) {
  const banner = document.getElementById("errorBanner");
  banner.textContent = msg;
  banner.style.display = "block";
}

function escHtml(str) {
  return (str || "").replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

function goToCart() {
  const url = `${CONFIG.cartPageURL}?mobile=${encodeURIComponent(sessionMobile)}`;
  window.location.href = url;
}

function goToOrders() {
  const url = `${CONFIG.ordersPageURL}?mobile=${encodeURIComponent(sessionMobile)}`;
  window.location.href = url;
}

// ============================================================
// INIT — Wait for Zoho Creator SDK
// ============================================================
ZOHO.CREATOR.init().then(function() {
  getSession();
  loadCategories();
  loadMenu();
});
</script>

<!-- Zoho Creator Widget SDK -->
<script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk.js"></script>

</body>
</html>
